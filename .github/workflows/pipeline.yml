name: "Estrutura de Diretório e Arquivos"

on:
  push:
    branches: [main]
  workflow_dispatch:  

env:
  NODE_VERSION: "18"
  
jobs:
  demonstrar_estrutura:
    name: "Demonstrar Estrutura Básica"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do Código"
        uses: actions/checkout@v3

      - name: "Configurar Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Exibir Estrutura de Diretórios e Arquivos"
        run: |
          echo "Estrutura de Diretórios e Arquivos:"
          tree -L 2
          
      - name: "Variáveis e Contexto" 
        run: |
          echo "Variáveis de Ambiente:"
          printenv
          echo "Contexto do Workflow:"
          echo "Variável env: ${{ env.NODE_VERSION }}"
          echo "Repositório: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "GITHUB_EVENT_NAME: $GITHUB_EVENT_NAME"    