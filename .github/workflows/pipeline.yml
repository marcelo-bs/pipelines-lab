name: "Hello Github Actions"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    
jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Código"
        uses: actions/checkout@v3
      - name: "Executar Hello World"
        run: echo "Hello Github Actions"
        
      - name: "Mostrar Informações do Sistema"
        run: |
          echo "Sistema Operacional: ${{ runner.os }}"
          echo "Diretório Atual: $(pwd)"
          echo "Data Atual: $(date)"
          echo "Usuário Atual: $(whoami)"
      - name: "Listar Arquivos no Diretório"
        run: ls -la
      - name: "Comandos Múltiplos"
        run: |
          echo "Este é o Lab 01 do curso de Github Actions"
          echo "Workflow executado com sucesso!" 
          echo "Pronto para os próximos passos!"      
